<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Manage Plans</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 14px;
    }

    /* Add Plan Form */
    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 32px;
    }

    .form-card h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input, .form-group select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: #667eea;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .btn-add {
      margin-top: 20px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    /* Plans Table */
    .table-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .table-card h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      padding: 10px 12px;
      border-bottom: 2px solid #f0f0f0;
    }

    td {
      padding: 14px 12px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #f5f5f5;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-active {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .badge-inactive {
      background: #fbe9e7;
      color: #c62828;
    }

    .btn-toggle {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-toggle:hover {
      background: #f5f5f5;
    }

    .btn-delete {
      padding: 6px 14px;
      border: 1px solid #ffcdd2;
      border-radius: 6px;
      background: #fff;
      color: #c62828;
      font-size: 12px;
      cursor: pointer;
      margin-left: 6px;
      transition: background 0.2s;
    }

    .btn-delete:hover {
      background: #ffebee;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-success { background: #4caf50; }
    .toast-error { background: #e53935; }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Plan Management</h1>
    <p class="subtitle">Add and manage product plans and pricing</p>

    <!-- Add Plan Form -->
    <div class="form-card">
      <h2>Add New Plan</h2>
      <form id="addPlanForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="product">Product Name</label>
            <input type="text" id="product" placeholder="e.g. tally, erp, talk2tally" required>
          </div>
          <div class="form-group">
            <label for="planName">Plan Name</label>
            <input type="text" id="planName" placeholder="e.g. monthly, yearly" required>
          </div>
          <div class="form-group">
            <label for="amount">Price (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 1000" min="1" required>
          </div>
          <div class="form-group">
            <label for="billingCycle">Billing Cycle (days)</label>
            <input type="number" id="billingCycle" value="30" min="1" required>
          </div>
          <div class="form-group full-width">
            <label for="description">Description (optional)</label>
            <input type="text" id="description" placeholder="e.g. Tally Monthly - ₹1,000/month">
          </div>
        </div>
        <button type="submit" class="btn-add">Add Plan</button>
      </form>
    </div>

    <!-- Existing Plans -->
    <div class="table-card">
      <h2>Existing Plans</h2>
      <div id="plansTable"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = window.location.origin;

    // Show toast notification
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast toast-${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Load all plans
    async function loadPlans() {
      try {
        const res = await fetch(`${API_BASE}/admin/plans`);
        const plans = await res.json();
        renderPlans(plans);
      } catch (err) {
        document.getElementById('plansTable').innerHTML =
          '<p class="empty-state">Failed to load plans</p>';
      }
    }

    // Render plans table
    function renderPlans(plans) {
      if (!plans.length) {
        document.getElementById('plansTable').innerHTML =
          '<p class="empty-state">No plans yet. Add one above.</p>';
        return;
      }

      const rows = plans.map(p => `
        <tr>
          <td><strong>${p.product}</strong></td>
          <td>${p.plan_name}</td>
          <td>₹${(p.amount_paise / 100).toLocaleString()}</td>
          <td>${p.billing_cycle_days} days</td>
          <td><span class="badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
          <td>
            <button class="btn-toggle" onclick="togglePlan('${p.plan_id}', ${!p.is_active})">
              ${p.is_active ? 'Deactivate' : 'Activate'}
            </button>
            <button class="btn-delete" onclick="deletePlan('${p.plan_id}')">Delete</button>
          </td>
        </tr>
      `).join('');

      document.getElementById('plansTable').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Plan</th>
              <th>Price</th>
              <th>Cycle</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // Add plan
    document.getElementById('addPlanForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const body = {
        product: document.getElementById('product').value.trim().toLowerCase(),
        plan_name: document.getElementById('planName').value.trim().toLowerCase(),
        amount_paise: parseInt(document.getElementById('amount').value) * 100,
        billing_cycle_days: parseInt(document.getElementById('billingCycle').value),
        description: document.getElementById('description').value.trim() || undefined,
      };

      try {
        const res = await fetch(`${API_BASE}/admin/plans`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Failed to add plan');
        }

        showToast('Plan added successfully');
        document.getElementById('addPlanForm').reset();
        document.getElementById('billingCycle').value = '30';
        loadPlans();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    // Toggle plan active/inactive
    async function togglePlan(planId, isActive) {
      try {
        const res = await fetch(`${API_BASE}/admin/plans/${planId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ is_active: isActive }),
        });

        if (!res.ok) throw new Error('Failed to update plan');
        showToast(`Plan ${isActive ? 'activated' : 'deactivated'}`);
        loadPlans();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Delete plan
    async function deletePlan(planId) {
      if (!confirm('Are you sure you want to delete this plan?')) return;

      try {
        const res = await fetch(`${API_BASE}/admin/plans/${planId}`, {
          method: 'DELETE',
        });

        if (!res.ok) throw new Error('Failed to delete plan');
        showToast('Plan deleted');
        loadPlans();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    // Initial load
    loadPlans();
  </script>
</body>
</html>
